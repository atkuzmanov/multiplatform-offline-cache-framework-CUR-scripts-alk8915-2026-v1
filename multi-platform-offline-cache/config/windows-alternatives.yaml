# Windows alternatives for software that appears in Ubuntu/macOS manifests but has no
# direct Windows equivalent. Top 2 (or more) alternatives per logical app.
# Format: canonical name (from brew cask / apt / app name) -> winget_ids and/or choco_packages and/or vendor_urls.
# Run: python3 scripts/merge-manifests.py to regenerate config/generated/winget-with-alternatives.txt

# Terminal / shell (iTerm2, Warp, etc.)
iterm2:
  winget_ids:
    - Microsoft.WindowsTerminal
    - Alacritty.Alacritty
warp:
  winget_ids:
    - Microsoft.WindowsTerminal
    - Alacritty.Alacritty

# Automation / keyboard (Hammerspoon, Karabiner)
hammerspoon:
  winget_ids:
    - AutoHotkey.AutoHotkey
    - Lexikos.AutoHotkey_v2
karabiner-elements:
  winget_ids:
    - Microsoft.PowerToys
    - AutoHotkey.AutoHotkey

# Window management (Spectacle, Rectangle)
spectacle:
  winget_ids:
    - Microsoft.PowerToys
    - 9NBLGGH5FV99  # FancyZones (or use PowerToys)
rectangle:
  winget_ids:
    - Microsoft.PowerToys
    - 9NBLGGH5FV99

# Mac-only backup/sync (Time Machine equivalent)
# (Generic backup on Windows: restic, duplicity, etc. - add to main Windows manifest)

